<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1260" font-family="'Courier New', monospace">

  <!-- Background -->
  <rect width="920" height="1260" fill="#0d1117"/>

  <!-- ── Title ── -->
  <text x="460" y="38" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="bold">Llama 3.2-3B — Tensor Shape Flow  (one Transformer Block)</text>
  <text x="460" y="60" text-anchor="middle" fill="#8b949e" font-size="12">Example: 1 sentence · 8 tokens  →  B=1, T=8, hidden=3072, head_dim=128</text>

  <!-- ── Example sentence ── -->
  <rect x="160" y="74" width="600" height="28" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="460" y="93" text-anchor="middle" fill="#f0883e" font-size="11">"The  quick  brown  fox  jumped  over  the  fence"  →  8 token ids  →  8 embedding vectors of size 3072</text>

  <!-- ═══════════════════════════════════════
       ARROW MARKER
       ═══════════════════════════════════════ -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 Z" fill="#484f58"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════
       NODE 0 — INPUT
       ═══════════════════════════════════════ -->
  <rect x="240" y="116" width="440" height="64" rx="8" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="460" y="138" text-anchor="middle" fill="#79c0ff" font-size="13" font-weight="bold">INPUT  x</text>
  <text x="460" y="158" text-anchor="middle" fill="#e6edf3" font-size="13">(1, 8, 3072)</text>
  <text x="460" y="173" text-anchor="middle" fill="#8b949e" font-size="10">1 batch · 8 tokens · 3072 features per token</text>

  <line x1="460" y1="180" x2="460" y2="202" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════
       NODE 1 — RMSNorm pre-attn
       ═══════════════════════════════════════ -->
  <rect x="240" y="202" width="440" height="72" rx="8" fill="#388bfd" opacity="0.10" stroke="#388bfd" stroke-width="1.5"/>
  <text x="460" y="224" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">RMSNorm  (attn_norm)</text>
  <text x="460" y="242" text-anchor="middle" fill="#8b949e" font-size="10">weight shape: (3072,)  — one scale per feature</text>
  <text x="460" y="259" text-anchor="middle" fill="#e6edf3" font-size="13">(1, 8, 3072)  →  (1, 8, 3072)</text>
  <text x="460" y="268" text-anchor="middle" fill="#8b949e" font-size="10" dy="4">each of the 8 token vectors is rescaled, shape unchanged</text>

  <line x1="460" y1="276" x2="460" y2="298" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════
       ATTENTION BLOCK CONTAINER
       ═══════════════════════════════════════ -->
  <rect x="155" y="298" width="610" height="358" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="460" y="320" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="bold">Grouped Query Attention</text>

  <!-- Q proj -->
  <rect x="175" y="330" width="570" height="56" rx="6" fill="#388bfd" opacity="0.09" stroke="#388bfd" stroke-width="1"/>
  <text x="460" y="350" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">Q projection   wq: (3072, 3072)</text>
  <text x="460" y="367" text-anchor="middle" fill="#e6edf3" font-size="12">(1, 8, 3072) × wqᵀ  →  (1, 8, 3072)  →  reshape  →  (1, 8, 24, 128)</text>
  <text x="460" y="379" text-anchor="middle" fill="#8b949e" font-size="10">8 tokens · 24 heads · 128 dims/head  =  3072</text>

  <!-- K proj -->
  <rect x="175" y="394" width="570" height="56" rx="6" fill="#388bfd" opacity="0.09" stroke="#388bfd" stroke-width="1"/>
  <text x="460" y="414" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">K projection   wk: (1024, 3072)  ← GQA: only 8 KV heads</text>
  <text x="460" y="431" text-anchor="middle" fill="#e6edf3" font-size="12">(1, 8, 3072) × wkᵀ  →  (1, 8, 1024)  →  reshape  →  (1, 8, 8, 128)</text>
  <text x="460" y="443" text-anchor="middle" fill="#8b949e" font-size="10">8 tokens · 8 KV heads · 128 dims/head  =  1024  (3× smaller than Q)</text>

  <!-- V proj -->
  <rect x="175" y="458" width="570" height="56" rx="6" fill="#388bfd" opacity="0.09" stroke="#388bfd" stroke-width="1"/>
  <text x="460" y="478" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">V projection   wv: (1024, 3072)  ← same as K</text>
  <text x="460" y="495" text-anchor="middle" fill="#e6edf3" font-size="12">(1, 8, 3072) × wvᵀ  →  (1, 8, 1024)  →  reshape  →  (1, 8, 8, 128)</text>
  <text x="460" y="507" text-anchor="middle" fill="#8b949e" font-size="10">same shape as K</text>

  <!-- RoPE + transpose + repeat -->
  <rect x="175" y="522" width="570" height="52" rx="6" fill="#3d1f6f" opacity="0.55" stroke="#6e40c9" stroke-width="1"/>
  <text x="460" y="540" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="bold">RoPE  ·  transpose  ·  repeat_interleave(K,V  ×3  to match Q)</text>
  <text x="460" y="556" text-anchor="middle" fill="#e6edf3" font-size="12">Q: (1, 24, 8, 128)     K,V: (1, 8, 8, 128)  →  (1, 24, 8, 128)</text>
  <text x="460" y="568" text-anchor="middle" fill="#8b949e" font-size="10">each KV head shared by 3 Q heads (24/8=3)</text>

  <!-- SDPA -->
  <rect x="175" y="582" width="570" height="42" rx="6" fill="#1a3a1a" stroke="#3fb950" stroke-width="1"/>
  <text x="460" y="600" text-anchor="middle" fill="#56d364" font-size="11" font-weight="bold">scaled_dot_product_attention   score: (1, 24, 8, 8)  → softmax → weighted V</text>
  <text x="460" y="616" text-anchor="middle" fill="#e6edf3" font-size="12">output: (1, 24, 8, 128)    ← each of 8 tokens attended to 8 positions per head</text>

  <!-- O proj -->
  <rect x="175" y="632" width="570" height="42" rx="6" fill="#388bfd" opacity="0.09" stroke="#388bfd" stroke-width="1"/>
  <text x="460" y="651" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">transpose + reshape  →  O projection   wo: (3072, 3072)</text>
  <text x="460" y="667" text-anchor="middle" fill="#e6edf3" font-size="12">(1, 24, 8, 128)  →  (1, 8, 3072)  →  (1, 8, 3072)</text>

  <line x1="460" y1="656" x2="460" y2="668" stroke="none"/>
  <line x1="460" y1="672" x2="460" y2="696" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════
       NODE 3 — Residual add 1
       ═══════════════════════════════════════ -->
  <rect x="240" y="696" width="440" height="52" rx="8" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="460" y="717" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">Residual Add   x = x + attn_out</text>
  <text x="460" y="735" text-anchor="middle" fill="#e6edf3" font-size="13">(1, 8, 3072)  +  (1, 8, 3072)  =  (1, 8, 3072)</text>
  <text x="460" y="742" text-anchor="middle" fill="#8b949e" font-size="10" dy="4">element-wise add — 8 × 3072 = 24 576 values unchanged in shape</text>

  <line x1="460" y1="750" x2="460" y2="772" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════
       NODE 4 — RMSNorm pre-mlp
       ═══════════════════════════════════════ -->
  <rect x="240" y="772" width="440" height="72" rx="8" fill="#388bfd" opacity="0.10" stroke="#388bfd" stroke-width="1.5"/>
  <text x="460" y="794" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">RMSNorm  (mlp_norm)</text>
  <text x="460" y="812" text-anchor="middle" fill="#8b949e" font-size="10">weight shape: (3072,)</text>
  <text x="460" y="829" text-anchor="middle" fill="#e6edf3" font-size="13">(1, 8, 3072)  →  (1, 8, 3072)</text>
  <text x="460" y="838" text-anchor="middle" fill="#8b949e" font-size="10" dy="4">same shape — just re-normalizes the 8 token vectors</text>

  <line x1="460" y1="846" x2="460" y2="868" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════
       MLP BLOCK CONTAINER
       ═══════════════════════════════════════ -->
  <rect x="155" y="868" width="610" height="224" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="460" y="890" text-anchor="middle" fill="#d2a8ff" font-size="13" font-weight="bold">SwiGLU MLP</text>

  <!-- gate -->
  <rect x="175" y="900" width="570" height="52" rx="6" fill="#388bfd" opacity="0.09" stroke="#388bfd" stroke-width="1"/>
  <text x="460" y="920" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">gate = silu( x @ w_gate.T )    w_gate: (8192, 3072)</text>
  <text x="460" y="937" text-anchor="middle" fill="#e6edf3" font-size="12">(1, 8, 3072)  →  (1, 8, 8192)   expand ×2.67   8 × 8192 = 65 536 values</text>
  <text x="460" y="946" text-anchor="middle" fill="#8b949e" font-size="10" dy="3">silu activation applied element-wise</text>

  <!-- up -->
  <rect x="175" y="960" width="570" height="52" rx="6" fill="#388bfd" opacity="0.09" stroke="#388bfd" stroke-width="1"/>
  <text x="460" y="980" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">up   = x @ w_up.T              w_up:   (8192, 3072)</text>
  <text x="460" y="997" text-anchor="middle" fill="#e6edf3" font-size="12">(1, 8, 3072)  →  (1, 8, 8192)   same expansion, no activation</text>
  <text x="460" y="1006" text-anchor="middle" fill="#8b949e" font-size="10" dy="3">gate * up: element-wise product — gate decides what passes through</text>

  <!-- down -->
  <rect x="175" y="1020" width="570" height="52" rx="6" fill="#388bfd" opacity="0.09" stroke="#388bfd" stroke-width="1"/>
  <text x="460" y="1040" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">(gate * up) @ w_down.T         w_down: (3072, 8192)</text>
  <text x="460" y="1057" text-anchor="middle" fill="#e6edf3" font-size="12">(1, 8, 8192)  →  (1, 8, 3072)   contract back   8 × 3072 = 24 576 values</text>
  <text x="460" y="1066" text-anchor="middle" fill="#8b949e" font-size="10" dy="3">back to residual stream width</text>

  <line x1="460" y1="1092" x2="460" y2="1114" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════
       NODE 6 — Residual add 2
       ═══════════════════════════════════════ -->
  <rect x="240" y="1114" width="440" height="52" rx="8" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="460" y="1135" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">Residual Add   x = x + mlp_out</text>
  <text x="460" y="1153" text-anchor="middle" fill="#e6edf3" font-size="13">(1, 8, 3072)  +  (1, 8, 3072)  =  (1, 8, 3072)</text>
  <text x="460" y="1160" text-anchor="middle" fill="#8b949e" font-size="10" dy="4">element-wise add — shape unchanged</text>

  <line x1="460" y1="1168" x2="460" y2="1190" stroke="#484f58" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════
       NODE 7 — OUTPUT
       ═══════════════════════════════════════ -->
  <rect x="240" y="1190" width="440" height="56" rx="8" fill="#1f6feb" opacity="0.15" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="460" y="1213" text-anchor="middle" fill="#79c0ff" font-size="13" font-weight="bold">OUTPUT  x  →  next block (×28 total)</text>
  <text x="460" y="1232" text-anchor="middle" fill="#e6edf3" font-size="13">(1, 8, 3072)</text>
  <text x="460" y="1242" text-anchor="middle" fill="#8b949e" font-size="10" dy="3">identical shape to input — residual stream preserved throughout</text>

  <!-- ═══════════════════════════════════════
       RESIDUAL BYPASS LINES
       ═══════════════════════════════════════ -->
  <!-- Attn residual — left side -->
  <path d="M 240 148 L 110 148 L 110 722 L 240 722" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="96" y="440" text-anchor="middle" fill="#f0883e" font-size="10" transform="rotate(-90,96,440)">x bypasses attention  (1,8,3072)</text>

  <!-- MLP residual — right side -->
  <path d="M 680 722 L 800 722 L 800 1140 L 680 1140" fill="none" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="814" y="932" text-anchor="middle" fill="#f0883e" font-size="10" transform="rotate(90,814,932)">x bypasses MLP  (1,8,3072)</text>

</svg>
